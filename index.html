<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Peta Betung dengan Layer Geologi</title>
    <!-- Library Three.js & GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; transition: opacity 1s;
        }
        
        /* Marker Styles */
        #markers-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 15;
        }
        .marker {
            position: absolute; top: 0; left: 0; pointer-events: auto; cursor: pointer;
            transform: translate(-50%, -50%); transition: transform 0.1s ease-out;
        }
        .marker-icon {
            width: 32px; height: 32px; background: #ef4444; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .marker-icon::after { content: ''; width: 10px; height: 10px; background: white; border-radius: 50%; }
        .marker:hover .marker-icon { background: #3b82f6; transform: rotate(-45deg) scale(1.2); }
        .marker .tooltip {
            position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 4px 10px;
            border-radius: 6px; font-size: 12px; font-weight: bold;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .marker:hover .tooltip { opacity: 1; bottom: 50px; }

        /* Info Panel Modal */
        #info-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        #info-panel.hidden-panel { transform: translateX(120%); opacity: 0; pointer-events: none; }

        /* Toast Notifikasi Koordinat */
        #coord-toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.9); color: white; padding: 8px 16px;
            border-radius: 8px; font-size: 14px; font-family: monospace;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 50;
        }
        
        .error-text { color: #ef4444; font-weight: bold; text-align: center; max-width: 80%; line-height: 1.5; }

        /* Toggle Button Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3b82f6;
        }
    </style>
</head>
<body>

    <!-- Header UI & Controls -->
    <div class="absolute top-6 left-6 text-white z-20 pointer-events-none">
        <h1 class="text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            PETA BETUNG 3D
        </h1>
        <p class="text-slate-400 text-xs uppercase tracking-widest mt-1">Sistem Informasi Geografis</p>
        
        <!-- UI Toggle Lapisan Geologi -->
        <div class="mt-6 bg-slate-900/80 backdrop-blur-md p-4 rounded-xl border border-white/10 pointer-events-auto shadow-lg flex items-center justify-between w-72">
            <div>
                <p class="text-sm font-bold text-white">Lapisan Geologi</p>
                <p class="text-xs text-slate-400 mt-0.5">Tampilkan data geologi</p>
            </div>
            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                <input type="checkbox" name="toggle" id="geology-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" onchange="toggleGeologyLayer()"/>
                <label for="geology-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-600 cursor-pointer transition-colors duration-200 ease-in-out"></label>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader">
        <div class="text-white font-black italic text-4xl mb-4 animate-pulse" id="loader-title">MEMUAT...</div>
        <div class="w-64 h-1 bg-white/10 rounded-full overflow-hidden" id="progress-container">
            <div id="progress-bar" class="w-0 h-full bg-blue-600 transition-all duration-300"></div>
        </div>
        <p id="status-text" class="text-slate-500 text-xs mt-4 tracking-widest uppercase text-center max-w-md">Menyiapkan Environment</p>

        <!-- UI Fallback Pemilih File Manual (Muncul Jika Error) -->
        <div id="fallback-ui" class="hidden mt-8 flex flex-col items-center gap-3 bg-slate-800/80 backdrop-blur-md p-6 rounded-xl border border-slate-700 w-80 shadow-2xl">
            <p class="text-white text-sm font-bold mb-2">Unggah File Manual</p>
            
            <div class="w-full">
                <label class="block text-xs text-slate-400 mb-1">Base Map (.glb) <span class="text-red-400">*</span></label>
                <input type="file" id="fallback-base" accept=".glb" class="w-full text-xs text-slate-300 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer transition-colors"/>
            </div>
            
            <div class="w-full mt-2">
                <label class="block text-xs text-slate-400 mb-1">Geology Map (.glb) <span class="text-slate-500">[Opsional]</span></label>
                <input type="file" id="fallback-geo" accept=".glb" class="w-full text-xs text-slate-300 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-emerald-600 file:text-white hover:file:bg-emerald-500 cursor-pointer transition-colors"/>
            </div>
            
            <button onclick="loadLocalFiles()" class="mt-4 w-full bg-slate-200 hover:bg-white text-slate-900 text-sm py-2 rounded-lg font-bold transition-colors">
                Muat 3D Lokal
            </button>
        </div>
    </div>

    <!-- Marker Layer -->
    <div id="markers-container"></div>

    <!-- Panel Informasi (Popup) -->
    <div id="info-panel" class="absolute right-6 top-24 w-80 bg-slate-900/90 backdrop-blur-xl border border-slate-700 rounded-2xl shadow-2xl overflow-hidden hidden-panel z-20">
        <div id="panel-image" class="w-full h-40 bg-slate-800 bg-cover bg-center hidden"></div>
        <div class="p-6">
            <div class="flex justify-between items-start mb-2">
                <h3 id="panel-title" class="text-xl font-bold text-white leading-tight">Nama Lokasi</h3>
                <button onclick="closePanel()" class="text-slate-400 hover:text-white bg-slate-800 p-1 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <p id="panel-desc" class="text-slate-300 text-sm leading-relaxed mb-4">Deskripsi lokasi.</p>
        </div>
    </div>

    <!-- Tooltip Notifikasi Kordinat -->
    <div id="coord-toast">Koordinat Tersalin!</div>

    <!-- Bantuan Navigasi -->
    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900/60 backdrop-blur-md px-6 py-3 rounded-full border border-white/10 text-white text-sm text-center pointer-events-none z-10 shadow-lg">
        <span class="text-blue-400">Navigasi:</span> Klik & Geser •
        <span class="text-blue-400">Zoom:</span> Scroll • 
        <span class="text-emerald-400 font-bold ml-2">KLIK GANDA model untuk ambil kordinat (X,Y,Z)</span>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let baseModel = null;
        let geologyModel = null;
        let raycaster, mouse;

        // URL File 3D Lokal
        const BASE_MAP_URL = 'base_map.glb';
        const GEOLOGY_MAP_URL = 'geologi_betung.glb';

        // Variabel progress loading
        let progressBase = 0;
        let progressGeo = 0;

        // ==========================================
        // DATA MARKER / TITIK LOKASI
        // ==========================================
        const markersData = [
            {
                id: 'site1',
                position: { x: 0, y: 45, z: -20 }, 
                title: "Air Terjun Puncak Gunung",
                description: "Destinasi wisata alam air terjun yang terletak di puncak gunung dengan pemandangan alam yang menakjubkan.",
                image: "https://images.unsplash.com/photo-1433086966358-54859d0ed716?q=80&w=400&auto=format&fit=crop"
            },
            {
                id: 'site2',
                position: { x: -30, y: 0, z: -40 },
                title: "Struktur Geologi Utama",
                description: "Titik observasi batuan dan struktur geologi khas area Betung.",
                image: "https://images.unsplash.com/photo-1518012628461-9c1626500b52?q=80&w=400&auto=format&fit=crop"
            }
        ];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 100, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(100, 200, 50);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 1024;
            sun.shadow.mapSize.height = 1024;
            scene.add(sun);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Setup Raycaster
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            renderer.domElement.addEventListener('dblclick', onDoubleClickGetCoordinates, false);

            window.addEventListener('resize', onWindowResize);
            
            // Mulai memuat kedua model secara otomatis
            loadAllModels();
            
            animate();
        }

        // Update UI Loading gabungan
        function updateCombinedProgress() {
            const totalProgress = (progressBase + progressGeo) / 2;
            document.getElementById('progress-bar').style.width = totalProgress + '%';
        }

        async function loadAllModels() {
            const statusText = document.getElementById('status-text');
            const loaderTitle = document.getElementById('loader-title');
            const loaderEl = document.getElementById('loader');
            const progressContainer = document.getElementById('progress-container');
            const fallbackUi = document.getElementById('fallback-ui');

            try {
                // 1. Muat Base Map
                statusText.innerText = "MENGUNDUH BASE MAP...";
                baseModel = await loadModelPromise(BASE_MAP_URL, (percent) => {
                    progressBase = percent;
                    updateCombinedProgress();
                });

                // Proses Base Map (Skala & Posisi)
                const targetPosition = processAndScaleModel(baseModel, true);

                // 2. Muat Geologi Map
                statusText.innerText = "MENGUNDUH LAPISAN GEOLOGI...";
                try {
                    geologyModel = await loadModelPromise(GEOLOGY_MAP_URL, (percent) => {
                        progressGeo = percent;
                        updateCombinedProgress();
                    });

                    // Terapkan skala & posisi yang PERSIS SAMA dengan Base Map
                    geologyModel.scale.copy(baseModel.scale);
                    geologyModel.position.copy(targetPosition);
                    // Tambahkan sedikit offset (ketinggian) agar tidak berbenturan/tenggelam di Base Map
                    geologyModel.position.y += 0.2; 

                    applyTransparentMaterial(geologyModel);
                    geologyModel.visible = false;
                    scene.add(geologyModel);

                } catch (geoError) {
                    console.warn("Geology map tidak ditemukan, melanjutkan dengan Base Map saja.", geoError);
                    statusText.innerText = "LAPISAN GEOLOGI TIDAK DITEMUKAN. MELANJUTKAN...";
                    document.getElementById('geology-toggle').disabled = true;
                }

                // 3. Selesaikan Loading
                finalizeLoading(loaderEl, statusText);

            } catch (error) {
                // PENANGANAN ERROR -> TAMPILKAN FALLBACK UI
                console.error("Fatal Load Error:", error);
                loaderTitle.innerText = "GAGAL MEMUAT SERVER FILE";
                loaderTitle.style.color = "#ef4444";
                loaderTitle.classList.remove('animate-pulse');
                progressContainer.style.display = 'none';
                
                statusText.className = "text-slate-300 text-sm mt-4 text-center max-w-md";
                statusText.innerHTML = `Base map <b>${BASE_MAP_URL}</b> tidak ditemukan.<br>Silakan pilih file secara manual dari komputer Anda di bawah ini:`;
                
                fallbackUi.classList.remove('hidden');
            }
        }

        // ==========================================
        // FITUR FALLBACK / PEMILIH FILE LOKAL
        // ==========================================
        async function loadLocalFiles() {
            const baseInput = document.getElementById('fallback-base');
            const geoInput = document.getElementById('fallback-geo');
            
            if (!baseInput.files || baseInput.files.length === 0) {
                alert("Harap pilih file Base Map (.glb) terlebih dahulu!");
                return;
            }

            const loaderTitle = document.getElementById('loader-title');
            const statusText = document.getElementById('status-text');
            const loaderEl = document.getElementById('loader');
            const fallbackUi = document.getElementById('fallback-ui');
            const progressContainer = document.getElementById('progress-container');

            // Reset UI Loading
            fallbackUi.classList.add('hidden');
            progressContainer.style.display = 'block';
            loaderTitle.innerText = "MEMPROSES FILE LOKAL...";
            loaderTitle.style.color = "#fff";
            loaderTitle.classList.add('animate-pulse');
            progressBase = 0;
            progressGeo = 0;

            try {
                // Buat URL Blob Sementara dari file input
                const baseUrl = URL.createObjectURL(baseInput.files[0]);
                
                statusText.innerText = "MEMUAT BASE MAP LOKAL...";
                baseModel = await loadModelPromise(baseUrl, (percent) => {
                    progressBase = percent;
                    updateCombinedProgress();
                });

                const targetPosition = processAndScaleModel(baseModel, true);

                // Jika pengguna juga mengunggah model Geologi
                if (geoInput.files && geoInput.files.length > 0) {
                    const geoUrl = URL.createObjectURL(geoInput.files[0]);
                    statusText.innerText = "MEMUAT GEOLOGI MAP LOKAL...";
                    
                    try {
                        geologyModel = await loadModelPromise(geoUrl, (percent) => {
                            progressGeo = percent;
                            updateCombinedProgress();
                        });

                        geologyModel.scale.copy(baseModel.scale);
                        geologyModel.position.copy(targetPosition);
                        // Tambahkan sedikit offset (ketinggian) agar tidak berbenturan/tenggelam di Base Map lokal
                        geologyModel.position.y += 0.2;

                        applyTransparentMaterial(geologyModel);
                        geologyModel.visible = false;
                        scene.add(geologyModel);
                        
                        document.getElementById('geology-toggle').disabled = false;
                        document.getElementById('geology-toggle').checked = false; // reset toggle state
                    } catch (geoError) {
                        console.error("Gagal memuat geologi lokal", geoError);
                        alert("Gagal memuat file Geologi. Melanjutkan dengan Base Map saja.");
                        document.getElementById('geology-toggle').disabled = true;
                    }
                } else {
                    // Bypass loading geologi
                    progressGeo = 100;
                    updateCombinedProgress();
                    document.getElementById('geology-toggle').disabled = true;
                }

                finalizeLoading(loaderEl, statusText);

            } catch (error) {
                console.error("Local file error:", error);
                alert("Gagal membaca file lokal: " + error.message);
                fallbackUi.classList.remove('hidden');
                progressContainer.style.display = 'none';
                loaderTitle.innerText = "GAGAL MEMUAT";
                loaderTitle.classList.remove('animate-pulse');
            }
        }

        // ==========================================
        // UTILITAS LOADING & PROCESSING
        // ==========================================
        function loadModelPromise(url, onProgressCb) {
            return new Promise((resolve, reject) => {
                const loader = new THREE.GLTFLoader();
                loader.load(
                    url,
                    (gltf) => resolve(gltf.scene),
                    (xhr) => {
                        if (xhr.lengthComputable) {
                            onProgressCb((xhr.loaded / xhr.total) * 100);
                        } else {
                            onProgressCb(50); 
                        }
                    },
                    (error) => reject(error)
                );
            });
        }

        function processAndScaleModel(model, isBaseModel) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 200 / maxDim;
            
            model.scale.setScalar(scale);
            const targetPosition = center.clone().multiplyScalar(scale).negate();
            targetPosition.y = 0; 
            model.position.copy(targetPosition);

            if(isBaseModel) {
                applyStandardMaterial(model);
                scene.add(model);
            }
            return targetPosition;
        }

        function finalizeLoading(loaderEl, statusText) {
            initMarkers();
            statusText.innerText = "MEMBANGUN ENVIRONMENT 3D...";
            renderer.render(scene, camera);
            loaderEl.style.opacity = '0';
            setTimeout(() => loaderEl.style.display = 'none', 1000);
        }

        // Fungsi Perbaikan Material Dasar
        function applyStandardMaterial(model) {
            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    if (node.material) {
                        const materials = Array.isArray(node.material) ? node.material : [node.material];
                        materials.forEach(m => {
                            if (!m.map || (m.color && m.color.getHex() === 0x000000)) {
                                if (m.color) m.color.setHex(0xd0d0d0);
                            }
                            m.transparent = false;
                            m.opacity = 1.0;
                            m.needsUpdate = true;
                        });
                    }
                }
            });
        }

        // Fungsi Material Transparan (Khusus Geologi)
        function applyTransparentMaterial(model) {
            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = false; 
                    node.receiveShadow = true;
                    // Paksa render model ini setelah base map selesai dirender
                    node.renderOrder = 1; 
                    if (node.material) {
                        const materials = Array.isArray(node.material) ? node.material : [node.material];
                        materials.forEach(m => {
                            const mClone = m.clone(); 
                            mClone.transparent = true;
                            mClone.opacity = 0.75; // Naikkan sedikit opacity agar lebih terlihat
                            mClone.depthTest = true; 
                            mClone.depthWrite = false; 
                            mClone.needsUpdate = true;
                            node.material = mClone;
                        });
                    }
                }
            });
        }

        // ==========================================
        // FITUR TOGGLE LAYER
        // ==========================================
        window.toggleGeologyLayer = function() {
            const toggleBtn = document.getElementById('geology-toggle');
            console.log("Toggle Status:", toggleBtn.checked); // Untuk debugging di console browser
            
            if (!geologyModel) {
                console.warn("Geology model belum tersedia!");
                return;
            }
            
            // Ubah visibilitas model utama
            geologyModel.visible = toggleBtn.checked;
            
            // Pastikan visibilitas anak-anak mesh di dalamnya juga ter-update (berguna untuk beberapa struktur GLTF)
            geologyModel.traverse((child) => {
                if (child.isMesh) {
                    child.visible = toggleBtn.checked;
                }
            });
        };

        // ==========================================
        // SISTEM MARKER
        // ==========================================
        function initMarkers() {
            const container = document.getElementById('markers-container');
            container.innerHTML = '';
            if (!baseModel) return;

            markersData.forEach(data => {
                const dummy = new THREE.Object3D();
                dummy.position.set(data.position.x, data.position.y, data.position.z);
                baseModel.add(dummy); 
                data.dummy3D = dummy;

                const markerEl = document.createElement('div');
                markerEl.className = 'marker';
                markerEl.innerHTML = `
                    <div class="marker-icon"></div>
                    <div class="tooltip">${data.title}</div>
                `;
                
                markerEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showPanel(data);
                });

                container.appendChild(markerEl);
                data.htmlElement = markerEl;
            });
        }

        function updateMarkersPosition() {
            if (!baseModel) return;

            markersData.forEach(data => {
                if (!data.dummy3D || !data.htmlElement) return;

                const tempV = new THREE.Vector3();
                data.dummy3D.getWorldPosition(tempV);
                tempV.project(camera);

                if (tempV.z > 1) {
                    data.htmlElement.style.display = 'none';
                    return;
                }

                const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;

                data.htmlElement.style.display = 'block';
                data.htmlElement.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
                data.htmlElement.style.zIndex = Math.round((1 - tempV.z) * 1000); 
            });
        }

        // ==========================================
        // UI PANEL & TOOLS KORDINAT
        // ==========================================
        window.showPanel = function(data) {
            const panel = document.getElementById('info-panel');
            const imgEl = document.getElementById('panel-image');
            
            document.getElementById('panel-title').innerText = data.title;
            document.getElementById('panel-desc').innerText = data.description;
            
            if(data.image) {
                imgEl.style.display = 'block';
                imgEl.style.backgroundImage = `url('${data.image}')`;
            } else {
                imgEl.style.display = 'none';
            }

            panel.classList.remove('hidden-panel');
        };

        window.closePanel = function() {
            document.getElementById('info-panel').classList.add('hidden-panel');
        };

        function onDoubleClickGetCoordinates(event) {
            const intersectTargets = [];
            if (baseModel && baseModel.visible) intersectTargets.push(baseModel);
            if (geologyModel && geologyModel.visible) intersectTargets.push(geologyModel);

            if (intersectTargets.length === 0) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(intersectTargets, true);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                const localPoint = baseModel.worldToLocal(point.clone());
                
                const jarakMinimal = 2.0; 
                const isDuplicate = markersData.some(marker => {
                    const dx = marker.position.x - localPoint.x;
                    const dy = marker.position.y - localPoint.y;
                    const dz = marker.position.z - localPoint.z;
                    const jarak = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    return jarak < jarakMinimal;
                });

                if (isDuplicate) {
                    console.log("📍 Klik diabaikan: Sudah ada marker di area ini.");
                    return; 
                }
                
                const coordString = `{ x: ${localPoint.x.toFixed(3)}, y: ${localPoint.y.toFixed(3)}, z: ${localPoint.z.toFixed(3)} }`;
                console.log("📍 Koordinat Baru:", coordString);
                
                const toast = document.getElementById('coord-toast');
                toast.innerHTML = `Koordinat Tersalin!<br><span class="text-xs text-emerald-200">${coordString}</span>`;
                toast.style.opacity = '1';
                
                const tempMarkerData = {
                    id: 'temp_' + Date.now(),
                    position: localPoint,
                    title: "Titik Inspeksi Baru",
                    description: `Koordinat lokal: ${coordString}\n\nLayer terbaca: ${intersects[0].object.name || 'Permukaan'}.`,
                    image: null
                };
                markersData.push(tempMarkerData);
                initMarkers(); 
                showPanel(tempMarkerData);

                setTimeout(() => toast.style.opacity = '0', 4000);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            updateMarkersPosition(); 
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
