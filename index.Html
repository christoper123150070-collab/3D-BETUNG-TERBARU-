<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Peta Betung dengan Marker</title>
    <!-- Library Three.js & FBXLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        
        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; transition: opacity 1s;
        }
        
        /* Marker Styles */
        #markers-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden; z-index: 15;
        }
        .marker {
            position: absolute; top: 0; left: 0; pointer-events: auto; cursor: pointer;
            transform: translate(-50%, -50%); transition: transform 0.1s ease-out;
        }
        .marker-icon {
            width: 32px; height: 32px; background: #ef4444; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg); border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .marker-icon::after { content: ''; width: 10px; height: 10px; background: white; border-radius: 50%; }
        .marker:hover .marker-icon { background: #3b82f6; transform: rotate(-45deg) scale(1.2); }
        .marker .tooltip {
            position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 4px 10px;
            border-radius: 6px; font-size: 12px; font-weight: bold;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .marker:hover .tooltip { opacity: 1; bottom: 50px; }

        /* Info Panel Modal */
        #info-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        #info-panel.hidden-panel { transform: translateX(120%); opacity: 0; pointer-events: none; }

        /* Toast Notifikasi Koordinat */
        #coord-toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.9); color: white; padding: 8px 16px;
            border-radius: 8px; font-size: 14px; font-family: monospace;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 50;
        }
    </script>
</head>
<body>

    <!-- Header UI -->
    <div class="absolute top-6 left-6 text-white z-10 pointer-events-none">
        <h1 class="text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
            PETA BETUNG 3D
        </h1>
        <p class="text-slate-400 text-xs uppercase tracking-widest mt-1">Sistem Informasi Geografis</p>
    </div>

    <!-- Loader -->
    <div id="loader">
        <div class="text-white font-black italic text-4xl mb-4 animate-pulse">MEMUAT...</div>
        <div class="w-64 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="progress-bar" class="w-0 h-full bg-blue-600 transition-all duration-300"></div>
        </div>
        <p id="status-text" class="text-slate-500 text-xs mt-4 tracking-widest uppercase">Menghubungkan</p>
    </div>

    <!-- Marker Layer -->
    <div id="markers-container"></div>

    <!-- Panel Informasi (Popup) -->
    <div id="info-panel" class="absolute right-6 top-24 w-80 bg-slate-900/90 backdrop-blur-xl border border-slate-700 rounded-2xl shadow-2xl overflow-hidden hidden-panel z-20">
        <div id="panel-image" class="w-full h-40 bg-slate-800 bg-cover bg-center hidden"></div>
        <div class="p-6">
            <div class="flex justify-between items-start mb-2">
                <h3 id="panel-title" class="text-xl font-bold text-white leading-tight">Nama Lokasi</h3>
                <button onclick="closePanel()" class="text-slate-400 hover:text-white bg-slate-800 p-1 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <p id="panel-desc" class="text-slate-300 text-sm leading-relaxed mb-4">Deskripsi lokasi.</p>
        </div>
    </div>

    <!-- Tooltip Notifikasi Kordinat -->
    <div id="coord-toast">Koordinat Tersalin!</div>

    <!-- Bantuan Navigasi -->
    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900/60 backdrop-blur-md px-6 py-3 rounded-full border border-white/10 text-white text-sm text-center pointer-events-none z-10">
        <span class="text-blue-400">Navigasi:</span> Klik & Geser •
        <span class="text-blue-400">Zoom:</span> Scroll • 
        <span class="text-emerald-400 font-bold ml-2">KLIK GANDA model untuk ambil kordinat (X,Y,Z)</span>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let currentModel = null;
        let raycaster, mouse;

        const MODEL_URL = 'peta 3d betung.fbx'; // Nama file Anda

        // ==========================================
        // DATA MARKER / TITIK LOKASI
        // ==========================================
        const markersData = [
            {
                id: 'site1',
                position: { x: 10, y: 0, z: 20 }, // Contoh posisi awal
                title: "Kantor Pusat Betung",
                description: "Ini adalah lokasi kantor utama di peta Betung. Area ini memiliki fasilitas lengkap.",
                image: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=400&auto=format&fit=crop"
            },
            {
                id: 'site2',
                position: { x: -30, y: 0, z: -40 },
                title: "Area Perumahan Baru",
                description: "Zona pengembangan perumahan tahap 2 dengan konsep green living.",
                image: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=400&auto=format&fit=crop"
            }
        ];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 100, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(100, 200, 50);
            sun.castShadow = true;
            scene.add(sun);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Setup Raycaster untuk mengambil koordinat
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            renderer.domElement.addEventListener('dblclick', onDoubleClickGetCoordinates, false);

            window.addEventListener('resize', onWindowResize);
            
            // Muat file FBX secara otomatis
            loadModelRobust(MODEL_URL);
            
            animate();
        }

        async function loadModelRobust(url) {
            const loaderEl = document.getElementById('loader');
            const progress = document.getElementById('progress-bar');
            const statusText = document.getElementById('status-text');

            const absoluteUrl = location.origin !== 'null' ? `${location.origin}/${encodeURIComponent(url)}` : encodeURI(url);

            try {
                statusText.innerText = "MENGAKSES SERVER...";
                const response = await fetch(absoluteUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length') || 0;
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    if (contentLength) {
                        const percent = (receivedLength / contentLength * 100);
                        progress.style.width = percent + '%';
                        statusText.innerText = `MENGUNDUH: ${Math.round(percent)}%`;
                    } else {
                        statusText.innerText = `MENGUNDUH: ${(receivedLength / 1024 / 1024).toFixed(1)} MB`;
                        progress.style.width = '50%';
                    }
                }

                statusText.innerText = "MEMPROSES 3D (MOHON TUNGGU)...";
                progress.style.width = '100%';
                await new Promise(resolve => setTimeout(resolve, 100));

                const blob = new Blob(chunks);
                const blobUrl = URL.createObjectURL(blob);

                const loader = new THREE.FBXLoader();
                loader.load(blobUrl, (object) => {
                    currentModel = object;
                    const box = new THREE.Box3().setFromObject(object);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 200 / maxDim;
                    object.scale.setScalar(scale);
                    object.position.sub(center.multiplyScalar(scale));
                    object.position.y = 0;

                    // Mengatasi warna hitam jika FBX tidak membawa tekstur
                    object.traverse((node) => {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                            if (node.material) {
                                const materials = Array.isArray(node.material) ? node.material : [node.material];
                                materials.forEach(m => {
                                    if (!m.map || (m.color && m.color.getHex() === 0x000000)) {
                                        if (m.color) m.color.setHex(0xd0d0d0);
                                    }
                                    m.transparent = false;
                                    m.opacity = 1.0;
                                });
                            }
                        }
                    });

                    scene.add(object);
                    
                    // Inisialisasi Marker SETELAH model masuk scene
                    initMarkers();
                    
                    URL.revokeObjectURL(blobUrl);
                    loaderEl.style.opacity = '0';
                    setTimeout(() => loaderEl.style.display = 'none', 1000);

                });

            } catch (error) {
                console.error(error);
                statusText.innerText = "Gagal memuat peta 3d betung.fbx";
                statusText.style.color = "#ff4444";
            }
        }

        // ==========================================
        // SISTEM MARKER
        // ==========================================
        function initMarkers() {
            const container = document.getElementById('markers-container');
            container.innerHTML = '';

            markersData.forEach(data => {
                const dummy = new THREE.Object3D();
                dummy.position.set(data.position.x, data.position.y, data.position.z);
                currentModel.add(dummy); 
                data.dummy3D = dummy;

                const markerEl = document.createElement('div');
                markerEl.className = 'marker';
                markerEl.innerHTML = `
                    <div class="marker-icon"></div>
                    <div class="tooltip">${data.title}</div>
                `;
                
                markerEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showPanel(data);
                });

                container.appendChild(markerEl);
                data.htmlElement = markerEl;
            });
        }

        function updateMarkersPosition() {
            if (!currentModel) return;

            markersData.forEach(data => {
                if (!data.dummy3D || !data.htmlElement) return;

                const tempV = new THREE.Vector3();
                data.dummy3D.getWorldPosition(tempV);
                tempV.project(camera);

                if (tempV.z > 1) {
                    data.htmlElement.style.display = 'none';
                    return;
                }

                const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;

                data.htmlElement.style.display = 'block';
                data.htmlElement.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
                data.htmlElement.style.zIndex = Math.round((1 - tempV.z) * 1000); 
            });
        }

        // ==========================================
        // UI PANEL & TOOLS KORDINAT
        // ==========================================
        function showPanel(data) {
            const panel = document.getElementById('info-panel');
            const imgEl = document.getElementById('panel-image');
            
            document.getElementById('panel-title').innerText = data.title;
            document.getElementById('panel-desc').innerText = data.description;
            
            if(data.image) {
                imgEl.style.display = 'block';
                imgEl.style.backgroundImage = `url('${data.image}')`;
            } else {
                imgEl.style.display = 'none';
            }

            panel.classList.remove('hidden-panel');
        }

        function closePanel() {
            document.getElementById('info-panel').classList.add('hidden-panel');
        }

        function onDoubleClickGetCoordinates(event) {
            if (!currentModel) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(currentModel, true);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                const localPoint = currentModel.worldToLocal(point.clone());
                
                const coordString = `{ x: ${localPoint.x.toFixed(3)}, y: ${localPoint.y.toFixed(3)}, z: ${localPoint.z.toFixed(3)} }`;
                console.log("📍 Koordinat Baru:", coordString);
                
                const toast = document.getElementById('coord-toast');
                toast.innerHTML = `Koordinat Tersalin!<br><span class="text-xs text-emerald-200">${coordString}</span>`;
                toast.style.opacity = '1';
                
                // Buat pin sementara untuk visualisasi saat klik ganda
                const tempMarkerData = {
                    id: 'temp_' + Date.now(),
                    position: localPoint,
                    title: "Titik Baru",
                    description: `Koordinat: ${coordString}\n\nSalin kordinat ini dari Console (F12) untuk dipasang permanen ke dalam kode.`,
                    image: null
                };
                markersData.push(tempMarkerData);
                initMarkers(); 
                showPanel(tempMarkerData);

                setTimeout(() => toast.style.opacity = '0', 4000);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            updateMarkersPosition(); // Sinkronisasi marker dengan kamera
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
